name: CI

on:
  pull_request:
    branches: [main, master, staging, production]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint
      - run: npx tsc --noEmit
      - run: npx next build
